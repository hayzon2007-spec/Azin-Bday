<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Azin ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(135deg,#ffb6d9,#d8b4fe,#b8e1ff);

background-size:300% 300%;

animation:bgMove 12s ease infinite;

}



@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}



.card{

width:90%;

max-width:800px;

padding:50px;

border-radius:25px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(15px);

text-align:center;

color:white;

box-shadow:0 10px 30px rgba(0,0,0,.2);

z-index:5;

}



h1{

font-family:'Dancing Script',cursive;

font-size:70px;

margin-bottom:25px;

}



#typing{

font-size:22px;

line-height:1.8;

white-space:pre-wrap;

min-height:220px;

}



.heart{

position:absolute;

font-size:24px;

animation:float 10s linear infinite;

opacity:.8;

}



@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}


20%{

opacity:1;

}


100%{

transform:translateY(-120vh);

opacity:0;

}

}



</style>

</head>


<body>


<div class="card">


<h1>🎂 Happy Birthday Azin ❤️</h1>


<div id="typing"></div>


</div>




<script>


// Floating hearts

for(let i=0;i<40;i++){


let h=document.createElement("div");


h.className="heart";


h.innerHTML=["💖","🌸","✨","🎈"][Math.floor(Math.random()*4)];


h.style.left=Math.random()*100+"vw";


h.style.animationDuration=(5+Math.random()*5)+"s";


h.style.animationDelay=Math.random()*5+"s";


document.body.appendChild(h);


}





// Letter message

const message=`Dear Azin,

Happy Birthday! 🎉

I made this little website just for you because I wanted to do something different.

Thank you for always supporting me and making even online conversations feel special.

I hope this new year of your life brings you happiness, good health, success, and countless beautiful memories.

Keep smiling, keep being yourself, and never stop shining.

Once again...

Happy Birthday! ❤️🎂✨`;



let i=0;



function type(){


if(i < message.length){


document.getElementById("typing").innerHTML += message.charAt(i);


i++;


setTimeout(type,20);


}


}



type();


</script>


</body>

</html>
