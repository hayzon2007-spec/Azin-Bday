<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Azin ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="floating-hearts"></div>

<div class="container">

<h3 class="small-text">A little surprise made with ❤️</h3>

<h1>Happy Birthday</h1>

<h2>Azin 🌸</h2>

<p class="quote">
"Every second brings us closer to your special day."
</p>

<div class="countdown">

<div class="box">
<span id="days">00</span>
<p>Days</p>
</div>

<div class="box">
<span id="hours">00</span>
<p>Hours</p>
</div>

<div class="box">
<span id="minutes">00</span>
<p>Minutes</p>
</div>

<div class="box">
<span id="seconds">00</span>
<p>Seconds</p>
</div>

</div>

<a href="letter.html" class="btn">
Begin the Journey ❤️
</a>

</div>

<script>

const birthday = new Date("July 11, 2026 00:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();

const distance = birthday-now;

const d=Math.floor(distance/(1000*60*60*24));
const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((distance%(1000*60*60))/(1000*60));
const s=Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML=d;
document.getElementById("hours").innerHTML=h;
document.getElementById("minutes").innerHTML=m;
document.getElementById("seconds").innerHTML=s;

},1000);


// Floating hearts

const hearts=document.querySelector(".floating-hearts");

for(let i=0;i<30;i++){

let heart=document.createElement("span");

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(5+Math.random()*6)+"s";

heart.style.fontSize=(18+Math.random()*20)+"px";

heart.style.animationDelay=Math.random()*5+"s";

hearts.appendChild(heart);

}

</script>

</body>
</html>
