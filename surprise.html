<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:auto;

background:linear-gradient(135deg,#ffd6ec,#e9d5ff);

padding:20px;

}



/* Main card */

.card{

width:90%;

max-width:700px;

padding:35px;

border-radius:25px;

background:rgba(255,255,255,0.25);

backdrop-filter:blur(15px);

box-shadow:0 10px 30px rgba(0,0,0,.15);

text-align:center;

color:white;

z-index:10;

}



h1{

font-family:'Dancing Script',cursive;

font-size:55px;

margin-bottom:20px;

}



h2{

font-size:35px;

}



/* Gift */

.gift{

font-size:120px;

cursor:pointer;

animation:bounce 2s infinite;

transition:.3s;

}



.gift:hover{

transform:scale(1.1);

}



@keyframes bounce{

50%{

transform:translateY(-15px);

}

}



/* Message */

#text{

display:none;

margin-top:25px;

font-size:20px;

line-height:1.8;

animation:fade 1s;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* Continue button */

#next{

display:none;

margin-top:30px;

padding:15px 40px;

background:#ff4f91;

color:white;

text-decoration:none;

border-radius:40px;

font-size:18px;

font-weight:bold;

position:relative;

z-index:20;

}



#next:hover{

transform:scale(1.05);

}



/* Hearts */

.heart{

position:absolute;

font-size:24px;

animation:float 8s linear infinite;

}



@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}



/* Confetti */

.confetti{

position:absolute;

font-size:22px;

animation:fall 5s linear infinite;

}



@keyframes fall{

from{

transform:translateY(-20px) rotate(0deg);

}

to{

transform:translateY(110vh) rotate(720deg);

}

}


</style>

</head>


<body>



<div class="card">


<h1>🎁 A Surprise For You 🎁</h1>


<p>Tap the gift...</p>



<div class="gift" onclick="openGift()">

🎁

</div>



<div id="text">


<h2>Happy Birthday Azin ❤️</h2>


<br>


<p>

I wanted to make something a little different...

<br><br>

Something that would hopefully make you smile.

<br><br>

Thank you for always supporting me.

<br><br>

I hope this small surprise makes your birthday a little more special. 🌸💖

</p>


</div>



<a id="next" href="birthday.html">

Continue ❤️

</a>



</div>



<script>


// Floating hearts

for(let i=0;i<35;i++){


let h=document.createElement("div");

h.className="heart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(5+Math.random()*5)+"s";

h.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(h);


}




function openGift(){


document.querySelector(".gift").innerHTML="🎊";


document.getElementById("text").style.display="block";



// Show continue button

setTimeout(()=>{


document.getElementById("next").style.display="inline-block";


},500);




// Confetti

for(let i=0;i<80;i++){


let c=document.createElement("div");


c.className="confetti";


c.innerHTML=["🎉","✨","🎊","💖"][Math.floor(Math.random()*4)];


c.style.left=Math.random()*100+"vw";


c.style.animationDuration=(3+Math.random()*3)+"s";


document.body.appendChild(c);


}


}


</script>


</body>

</html>
